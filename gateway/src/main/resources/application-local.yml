            initial-size: 15
            max-active: 30
            min-idle: 5
            max-wait: 60000
            validation-query: SELECT 1
            test-on-borrow: true
    # Druid的其他属性配置
    druid:
      # 开启后台 http://localhost:8288/druid
      stat-view-servlet:
        enabled: true
        url-pattern: /druid/*
        # 访问监控页面 登陆账号
        login-username: admin
        # 访问监控页面 登陆密码
        login-password: admin
      # 是否开启 FilterStat，默认true
      filter:
        stat:
          enabled: true
          # 是否开启 慢SQL 记录，默认false
          log-slow-sql: true
          # 慢 SQL 的日志级别
          slow-sql-log-level: WARN
          # 慢 SQL 的标准，默认 3000，单位：毫秒
          slow-sql-millis: 1000

# 指定logback配置文件
logging:
  config: classpath:logback-local.xml

groovy:
  enable: true
  groovyPath: scripts/groovy