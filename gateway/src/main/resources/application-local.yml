application:
  name: GateServer

server:
  port: 8288

net:
  id: 2000
  group: GATE
  server:
    enable: true
    # 当前服务器 ip
    ip: 127.0.0.1
    port: 8200
    protocol: websocket
    bossThreadNum: 1
    workThreadNum: 16
    soBacklog: 128
    soKeepalive: true
    tcpNoDelay: false
  client:
    enable: true
    protocol: socket
    clientThreadNum: 16
    soKeepalive: true
    tcpNoDelay: false
  register:
    enable: true
    retryCount: 20
    servers:
      - ip: 127.0.0.1
        port: 8100
  thread:
    enable: true
    player-core-pool-size: 16

rpc:
  enable: true

luban:
  enable: true
  remote: true
  endpoint: https://luban-dev.baloot-xy.com/luban_server/
  port: 8299
  secret-access-key: xxxx123
  config-file-cache-path: D:\data\luban\baloot\gate-cache
  config-entity-package-names:
    - com.game.luban

spring:
  data:
    redis:
      host: r-uf6jzg20l7dcc3nstlpd.redis.rds.aliyuncs.com
      port: 6379
      password: PtfR4duIAGnW5jQk
      database: 10
      connect-timeout: 3000
      lettuce:
        pool:
          max-active: 512
          min-idle: 5
          max-idle: 128
          max-wait: 3000
  datasource:
    dynamic:
      primary: primary
      datasource:
        primary:
          driver-class-name: com.mysql.cj.jdbc.Driver
          url: jdbc:mysql://rm-uf6a91300v21mb045bo.mysql.rds.aliyuncs.com:3306/baloot_dat_local?autoReconnect=true&allowMultiQueries=true&useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai
          username: mysql_root
          password: hcT2jnHAKsqRYDJg
          type: com.alibaba.druid.pool.DruidDataSource
          druid:
            initial-size: 15
            max-active: 30
