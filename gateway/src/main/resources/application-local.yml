            max-wait: 60000
            validation-query: SELECT 1
            test-on-borrow: true
        baloot_statistic:
          driver-class-name: com.mysql.cj.jdbc.Driver
          url: jdbc:mysql://rm-uf6a91300v21mb045bo.mysql.rds.aliyuncs.com:3306/baloot_statistic_local?autoReconnect=true&allowMultiQueries=true&useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai
          username: mysql_root
