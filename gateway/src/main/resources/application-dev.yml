# 游戏网络自定义配置
net:
  # 版本号
  version: 0
  # 服务id
  id: 2000
  group: GATE
  server:
    enable: true
    # 当前服务器 ip
    ip: 192.168.1.183
    port: 8200
    protocol: websocket
    bossThreadNum: 1
    workThreadNum: 64
    soBacklog: 128
    soKeepalive: true
    tcpNoDelay: false
  client:
    enable: true
    protocol: socket
    clientThreadNum: 64
    soKeepalive: true
    tcpNoDelay: false
  register:
    enable: true
    retryCount: 20
    servers:
      - ip: 192.168.1.183
        port: 8100
  thread:
    enable: true
    player-core-pool-size: 64


