/** 语音房类型 */
enum VoiceTypeEnum {
  /** 交友 */
  VOICE_TYPE_FRIENDS = 0;
  /** 聊天 */
  VOICE_TYPE_CHAT = 1;
  /** 唱歌 */
  VOICE_TYPE_SINGING = 2;
  /** 游戏 */
  VOICE_TYPE_GAME = 3;
}

/** 语音房玩家角色 */
enum VoiceRoleEnum {
  /** 房主 */
  VOICE_ROLE_OWNER = 0;
  /** 管理员 */
  VOICE_ROLE_ADMIN = 1;
  /** 成员 */
  VOICE_ROLE_MEMBER = 2;
  /** 游客 */
  VOICE_ROLE_GUEST = 3;
}

/** 语音房基本信息 */
message VoiceListTableBean {
  /** 房间ID */
  VoiceTableBean baseTable = 1;
  /** 我喜欢的房间 */
  bool myLike = 2;
  /** 我关注的房间 */
  bool myFollow = 3;
}

/** 语音房简单信息 */
message VoiceTableSimpleBean {
  /** 房间ID */
  int32 id = 1;
  /** 房间名 */
  string name = 2;
  /** 房间logo */
  string logo = 3;
  /** 国家 */
  string country = 4;
}

/** 语音房基本信息 */
message VoiceTableBean {
  /** 房间ID */
  int32 id = 1;
  /** 房主ID */
  int64 ownerId = 2;
  /** 房间名 */
  string name = 3;
  /** 房间logo */
  string logo = 4;
  /** 房间简介 */
  string desc = 5;
  /** 国家 */
  string country = 6;
  /** 房间类型 */
  VoiceTypeEnum type = 7;
  /** 房间人数 */
  int32 onlineNum = 8;
  /** 喜欢人数（仅自己可见） */
  int32 likeNum = 9;
  /** 座位类型 0-5人 1-10人 */
  int32 seatType = 10;
  /** 房间皮肤 */
  string skinId = 11;
}

/** 语音房玩家信息 */
message VoicePlayerBean {
  /** 玩家ID */
  int64 playerId = 1;
  /** 玩家昵称 */
  string nick = 2;
  /** 性别 0-男 1-女 */
  int32 sex = 3;
  /** 玩家头像 */
  string head = 4;
  /** 玩家头像框 */
  int32 headFrame = 5;
  /** 玩家语音房头像框 */
  ItemBean voiceHeadFrame = 6;
  /** 语音房玩家角色 */
  VoiceRoleEnum role = 7;
  /** 我喜欢的房间 */
  bool myLike = 8;
  /** 我关注的房间 */
  bool myFollow = 9;
  /** 玩家token */
  string voiceToken = 10;
  /** 是否被禁言 */
  bool muteMic = 11;
  /** 静音的玩家（仅自己不听这些人说话） */
  repeated int64 skipMicPlayerIds = 12;
  /** 是否静音所有玩家 */
  bool skipAll = 13;
}

/** 语音房列表类型 */
enum VoiceListTypeEnum {
  /** 全局的 */
  VOICE_LIST_GLOBAL = 0;
  /** 最近的 */
  VOICE_LIST_RECENT = 1;
  /** 喜欢的 */
  VOICE_LIST_LIKE = 2;
  /** 关注的 */
  VOICE_LIST_FOLLOW = 3;
  /** 自己的 */
  VOICE_LIST_OWNER = 4;
  /** ID搜索 - param：目标voiceId */
  VOICE_LIST_SEARCH = 5;
  /** 他人房间 - param：目标playerId */
  VOICE_LIST_TARGET = 6;
}

// 请求获取语音房列表
message CZVoiceListMessage {
  /** 列表类型 */
  VoiceListTypeEnum listType = 1;
  /** 当前查询的偏移量 */
  int32 offset = 2;
  /** 参数 当查询他人房间时传入他人房间id */
  string param = 3;
}

// 响应获取语音房列表
message ZCVoiceListMessage {
  /** 列表语音房信息 */
  repeated VoiceListTableBean tables = 1;
}

// 请求创建语音房
message CZVoiceCreateMessage {
  /** 房间名 */
  string name = 1;
  /** 房间logo */
  string logo = 2;
  /** 房间简介 */
  string desc = 3;
  /** 房间背景 */
  string skinId = 4;
  /** 房间类型 */
  VoiceTypeEnum type = 5;
}

// 响应创建语音房
message ZCVoiceCreateMessage {
  /** 列表语音房信息 */
  VoiceListTableBean tables = 1;
}

// 语音房命令枚举
enum VoiceCommandEnum {
  /** 喜欢房间-无arg，无推送 */
  VOICE_COMMAND_LIKE = 0;
  /** 取消喜欢房间-无arg，无推送 */
  VOICE_COMMAND_UN_LIKE = 1;
  /** 语音房数据同步(进入) */
  VOICE_COMMAND_SYNC = 2;
  /** 语音房数据同步(推送他人) */
  VOICE_COMMAND_SYNCED = 3;
  /** 语音房退出 */
  VOICE_COMMAND_EXIT = 4;
  /** 申请麦克风 arg0: seatId */
  VOICE_COMMAND_APPLY_MIKE = 5;
  /** 接受申请麦克风 TODO next version */
  VOICE_COMMAND_ACCEPT_APPLY_MIKE = 6;
  /** 邀请加入麦克风 arg0: seatId; arg1: targetPlayerId TODO next version */
  VOICE_COMMAND_INVITE_MIKE = 7;
  /** 接受邀请加入麦克风 TODO next version */
  VOICE_COMMAND_ACCEPT_INVITE_MIKE = 8;
  /** 将玩家踢出麦克风 arg0: seatId */
  VOICE_COMMAND_KICK_MIKE = 9;
  /** 玩家离开麦克风 */
  VOICE_COMMAND_LEAVE_MIKE = 10;
  /** 自己换麦克风 arg0: toSeatId */
  VOICE_COMMAND_CHANGE_MIKE = 11;
  /** 帮其他人交换麦克风(需要权限) arg0: fromSeatId; arg1: toSeatId */
  VOICE_COMMAND_CHANGE_OTHER_MIKE = 12;
  /** 锁住麦克风(无法申请上麦) arg0: seatId */
  VOICE_COMMAND_LOCK_MIKE = 13;
  /** 静音玩家(自己听不见) arg0: targetPlayerId */
  VOICE_COMMAND_SKIP_MIKE = 14;
  /** 静音所有玩家(自己听不见) */
  VOICE_COMMAND_SKIP_ALL = 15;
  /** 禁言玩家(大家听不见) arg0: targetPlayerId */
  VOICE_COMMAND_MUTE_PLAYER_MIKE = 16;
  /** 刷新语音token */
  VOICE_COMMAND_REFRESH_TOKEN = 17;
  /** 房间设置 */
  VOICE_COMMAND_SETTING = 18;
  /** 踢出玩家 arg0: targetPlayerId */
  VOICE_COMMAND_KICK_PLAYER = 19;
  /** 查看在线玩家列表 arg0: offset */
  VOICE_COMMAND_PLAYER_LIST = 20;
  /** 发送礼物 arg0: 礼物id; arg1: 类型(大于0: 指定玩家发送; -1: 给所有人发送礼物; -2: 给上麦玩家发送); arg2: 发送礼物数量; */
  VOICE_COMMAND_SEND_GIFT = 21;
}

// 请求执行语音房命令
message CZVoiceExecuteCommandMessage {
  /** 语音房ID */
  int32 voiceId = 1;
  /** 语音房命令 */
  VoiceCommandEnum command = 2;
  /** 语音房命令参数 */
  repeated string args = 3;
}

// 推送语音房信息
message OnZCVoiceInfoMessage {
  /** 操作命令 */
  VoiceCommandEnum command = 1;
  /** 房间信息 */
  VoiceTableBean table = 2;
  /** 麦信息列表 */
  repeated VoiceMicBean micList = 3;
  /** 首页展示玩家信息(只显示前4个) */
  repeated VoicePlayerBean showList = 4;
  /** 在线列表玩家信息(分页的在线列表数据) */
  repeated VoicePlayerBean playerList = 5;
  /** 自己信息 */
  VoicePlayerBean self = 6;
  /** 收到影响的玩家ID */
  int64 affectedPlayerId = 7;
  /** 发送语音房礼物信息bean */
  VoiceGiftRecordBean sendVoiceGiftBean = 8;
  /** 昨日送礼榜Top10玩家 */
  repeated int64 playerTop10 = 9;
  /** 房间积分 */
  int64 score = 10;
}

// 语音房麦克风信息bean
message VoiceMicBean {
  /** 座位号 */
  int32 seatId = 1;
  /** 状态: 0: 正常; -1: 锁住 */
  int32 state = 2;
  /** 上麦玩家 未上麦为null */
  VoicePlayerBean seatPlayer = 3;
}


// 请求获取语音房简单信息集
message CZGetVoiceTableSimpleBeansMessage {
  /** 语音房ids */
  repeated int32 voiceIds = 1;
}

// 返回语音房简单信息集
message ZCGetVoiceTableSimpleBeansMessage {
  /** 语音房ids */
  repeated VoiceTableSimpleBean beans = 1;
}



// 请求获取玩家语音房礼物信息列表
message CZGetPlayerVoiceGiftListMessage {
  /** 类型: -1: 所有列表; 0: 赠送列表; 1: 接收列表 */
  int32 type = 1;
  /** 槽位(从0开始) */
  int32 position = 2;
  /** 总数 */
  int32 count = 3;
}

// 响应获取玩家语音房礼物信息列表
message ZCGetPlayerVoiceGiftListMessage {
  /** 发送礼物总数 */
  int64 sendNum = 1;
  /** 接收礼物总数 */
  int64 receiveNum = 2;
  /** 礼物bean列表 */
  repeated VoiceGiftRecordBean giftRecordBeanList = 3;
  /** 总数 */
  int32 count = 4;
}

// 礼物bean
message VoiceGiftRecordBean {
  /** 操作类型: 0-主动发送; 1: 被动接收 */
