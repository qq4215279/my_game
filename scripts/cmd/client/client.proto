/** 操作类型 */
enum ClientDBOperationType {
  /** 查询 */
  SELECT = 0;
  /** 更新 */
  UPDATE = 1;
  /** 删除 */
  DELETE = 2;
}

/** 客户端请求数据操作 */
message CEClientDBMessage {
  /** 操作类型 */
  ClientDBOperationType operationType = 1;
  /** 唯一key（varchar30） */
  repeated string keys = 2;
  /** 值（varchar200）UPDATE时传递 */
  repeated string values = 3;
}

/** 服务器返回数据操作结果 */
message ECClientDBMessage {
  /** key-value,更新删除操作会返回旧值 */
  map<string, string> map = 1;
}

