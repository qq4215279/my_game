syntax = "proto3";




// -------------------------- 活动组件请求 --------------------------

// 活动消息请求
message CWActivityInfoMessage {
  /** 功能id */
  int32 funcId = 1;
  /** 参数 排行榜功能传入(DAILY WEEK MONTH TOTAL) */
  string param = 2;
}

// 活动消息返回
message WCActivityInfoMessage {
  /** 任务消息 */
  ActivityTaskInfo taskInfo = 1;
  /** 商城 */
  ActivityShopInfo shopInfo = 2;
  /** 活跃度消息 */
  ActivityProgressInfo progressInfo = 3;
  /** 排行榜消息 */
  ActivityRankInfo rankInfo = 4;
  /** 活动装盘抽奖信息 */
  ActivityTurntableDrawInfo turntableDrawInfo = 5;
}


// -------------------------- 【任务】活动组件 --------------------------
// 活动任务信息
message ActivityTaskInfo {
  /** 活跃度进度奖励bean列表 */
  repeated TaskBean progressRewardList = 1;
}



// -------------------------- 【商城】活动组件 --------------------------
// 活动任务信息
message ActivityShopInfo {
  /** 商品列表信息 */
  repeated GoodsBean goodsList = 1;
}



// -------------------------- 【活跃度】活动组件 --------------------------
// 活跃度进度消息
message ActivityProgressInfo {
  /** 活跃度进度奖励bean列表 */
  repeated ActivityProgressRewardBean progressRewardList = 1;
  /** 当前进度 */
  int32 progress = 2;
}

// 活跃度进度奖励bean
message ActivityProgressRewardBean {
  /** id */
  int32 id = 1;
  /** 领取状态: 0: 未领取; 1: 可领取; 2: 已领取 */
  int32 state = 2;
  /** 领取条件 */
  ItemBean consume = 3;
  /** 奖励 */
  repeated ItemBean rewards = 4;
}

// 请求领取活跃度奖励
message CWGetActivityProgressRewardMessage {
  /** 功能id */
  int32 funcId = 1;
  /** 活跃度奖励ID */
  int32 progressId = 2;
}

// 响应领取的活跃度奖励
message WCGetActivityProgressRewardMessage {
  /** 奖励列表 */
  repeated ItemBean rewards = 1;
}

// 请求记录玩家活跃信息
message AWRecordPlayerActiveMessage {
  /** 类型 0: 在线时间; 1: 聊天次数; 2: 游戏对局; 3: 送礼次数 */
  int32 type = 1;
  /** 参数 */
  string param = 2;
}




// -------------------------- 【排行榜】活动组件 --------------------------
// 排行榜信息
message ActivityRankInfo {
  /** 奖励发送类型： 0: 掉落形式; 1: 百分比形式 */
  int32 rewardType = 1;
  /** 掉落 - 排行榜掉落排名奖励 */
  repeated RankRewardBean rankRewardBeanList = 2;
  /** 百分比 - 奖励 */
  ItemBean percentReward = 3;
  /** 百分比 - 排行榜百分比排名奖励 */
  repeated RankRewardByPercentBean rankRewardByPercentBeanList = 4;
}

// 排行榜掉落排名奖励
message RankRewardBean {
  /** 排名范围Min */
  int32 min = 1;
  /** 排名范围Max */
  int32 max = 2;
  /** 奖励列表 */
  repeated ItemBean rewards = 3;
}

// 排行榜百分比排名奖励
message RankRewardByPercentBean {
  /** 排名范围Min */
  int32 min = 1;
  /** 排名范围Max */
  int32 max = 2;
  /** 百分比 */
  int32 percent = 3;
}

// -------------------------- 【转盘抽奖】活动组件 --------------------------
// 活动装盘抽奖信息
message ActivityTurntableDrawInfo {
  /** 单抽消耗 */
  ItemBean oneConsume = 1;
  /** 单抽通用消耗(当消耗道具不足时，使用通用消耗替换默认消耗) */
  ItemBean oneCommonConsume = 2;
  /** 10抽消耗 */
  ItemBean tenConsume = 3;
  /** 10抽通用消耗(当消耗道具不足时，使用通用消耗替换默认消耗) */
  ItemBean tenCommonConsume = 4;
  /** 装盘奖励bean list */
  repeated TurntableDrawRewardBean turntableDrawRewardBeanList = 5;
  /** 大奖记录信息 */
  repeated TurntableDrawRecordBean turntableDrawRecordBeanList = 6;
}

// 装盘奖励bean
message TurntableDrawRewardBean {
  /** id */
  int32 id = 1;
  /** 奖励 */
  repeated ItemBean rewards = 2;
  /** 是否是大奖 */
  bool bigReward = 3;
}

// 装盘抽奖记录bean
message TurntableDrawRecordBean {
  /** 玩家名称 */
  string name = 1;
  /** 奖励 */
  repeated ItemBean rewards = 2;
  /** 中奖时间 */
  int64 createTime = 3;
}

// 请求获取玩家转盘抽奖记录信息
message CWGetTurntableDrawRecordMessage {
  /** 功能id */
  int32 funcId = 1;
}

// 响应获取玩家转盘抽奖记录信息
message WCGetTurntableDrawRecordMessage {
  /** 历史抽奖记录信息 */
  repeated TurntableDrawRecordBean turntableDrawRecordBeanList = 1;
}

// 请求玩家转盘抽奖
message CWTurntableDrawMessage {
  /** 功能id */
  int32 funcId = 1;
  /** 抽奖次数 */
  int32 count = 2;
}

// 响应玩家转盘抽奖
message WCTurntableDrawMessage {
  /** id */
  int32 id = 1;
  /** 奖励 */
  repeated ItemBean rewards = 2;
}



// 响应游戏桌子信息
message BalootTableBean {
  /** seq */
  int32 seq = 1;
  /** 状态: 1: 等待; 2: 发牌; 3: 叫牌; 4: 加倍; 5: 行牌; 6: 行牌墩结算; 7: 行牌盘结算; 8: 最终结算; 9: 最终结算完成; 10: 游戏开始 */
  int32 state = 2;
  /** 游戏模式: 0: 未确定; 1: hokum; 2: 2rd hokum; 3: sun; 4: ashkal */
  int32 mode = 3;
  /** 游戏倍数: 1: 默认1倍; 2: 2倍; 3: 3倍; 4: 4倍; 5: 5倍(gahwa); */
  int32 multi = 4;
  /** 行牌模式: 0: open-默认; 1：close  */
  int32 playMode = 5;
  /** 盘数 */
  int32 circle = 6;
  /** 1. 叫牌阶段: 叫牌轮次; 2: 行牌阶段: 行牌墩数 */
  int32 round = 7;
  /** 发牌员 */
  int32 dealerSeatId = 8;
  /** 主宰者 */
  int32 masterSeatId = 9;
  /** 加倍者 */
  int32 multiSeatId = 10;
  /** 展示牌 未确定: -1 */
  int32 displayPokerId = 11;
  /** 展示牌拥有玩家 未确定: -1 */
  int32 displaySeatId = 12;
  /** 当前叫牌玩家列表 */
  repeated BiderBean biderBeans = 13;
  /** 操作倒计时 */
  int64 countdown = 14;
  /** 队伍信息列表 */
  repeated TeamBean teanbeans = 15;
  /** 游戏主花色 */
  int32 mainColorType = 16;
  /** 游戏倍数 */
  BalootMultiBean balootMultiBean = 17;
}

// 桌子玩家信息
message PokerPlayerBean {
  /** 是否准备开始游戏 */
  bool isReady = 1;
  /** 是否托管 */
  bool isTrusteeship = 2;
  /** 玩家所在队伍id */
  int32 teamId = 3;
  /** 游戏玩家信息 */
  PokerBean pokerBean = 4;
  /** 玩家Project牌型 */
  repeated ProjectBean projectBeans = 5;
  /** 玩家baloot牌型 */
  ProjectBean balootBean = 6;
}

// 玩家游戏牌
message PokerBean {
  /** 剩余手牌 */
  repeated int32 restPokers = 1;
  /** 剩余手牌数量 */
  int32 restCount = 2;
  /** 获得的分数手牌 */
  repeated int32 scorePokers = 3;
  /** 原始手牌 */
  repeated int32 allPokers = 4;
  /** 当前墩出牌 */
  int32 playPoker = 5;
}

// 玩家Project牌型
message ProjectBean {
  /** project类型(0: baloot; 1: sira; 2: 50; 3: 100; 4: 400;) */
  int32 projcetType = 1;
  /** projcet分值 */
  int32 score = 2;
  /** project手牌 */
  repeated int32 pokers = 3;
  /** project倍数 */
  int32 multi = 4;
}

// 游戏倍数bean
message BalootMultiBean {
  /** 最终倍数 */
  int32 finalMulti = 1;
  /** 翻倍倍数 */
  int32 commonMulti = 2;
  /** 连赢倍数(连赢盘/连赢墩) */
  int32 winCountMulti = 3;
  /** project倍数 */
  int32 projectMulti = 4;
  /** 春天倍数 */
  int32 springMulti = 5;
}

// 队伍信息
message TeamBean {
  /** 队伍id */
  int32 teamId = 1;
  /** 队伍名称 */
  string name = 2;
  /** 当前局队伍总分 */
  int32 totalScore = 3;
  /** 终局是否胜利 */
  bool isWin = 4;
  /** 玩家列表 */
  repeated int64 playerIds = 5;
  /** 面板信息 */
  PanelBean panelBean = 6;
}

/** 面板信息 */
message PanelBean {
  /** 春天(连赢8墩) */
  bool isSpring = 1;
  /** 赢墩积分 */
  int32 eats = 2;
  /** 最后一墩获胜阵营积分 */
  int32 ground = 3;
  /** project积分 */
  int32 project = 4;
  /** abant积分 */
  int32 abnat = 5;
  /** 本盘是否获胜 */
  bool isWin = 6;
  /** 本盘赢得积分 */
  int32 score = 7;
}

// 叫话玩家
message BiderBean {
  /** 当前叫牌玩家 */
  int32 bidSeatId = 1;
  /** 玩家命令集 */
  repeated CmdBean cmdBeans = 2;
}

// 命令
message CmdBean {
  /** 命令 */
  CommandEnum command = 1;
  /** 命令参数列表 */
  repeated string args = 2;
}

// 命令枚举
enum CommandEnum {
  /** 准备开始游戏 */
  READY = 0;
  /** pass */
  PASS = 1;
  /** wala */
  WALA = 2;
  /** sun */
  SUN = 3;
  /** hokum */
  HOKUM = 4;
  /** 2nd hokum */
  SECEND_HOKUM = 5;
  /** ashkal */
  ASHKAL = 6;
  /** 加倍 - double */
  DOUBLE = 7;
  /** 加倍 - three */
  THREE = 8;
  /** 加倍 - four */
  FOUR = 9;
  /** 加倍 - Gahwa */
  GAHWA = 10;
  /** 主花色 参数为选择的扑克牌类型 */
  MAIN_COLOR = 11;
  /** 行牌 参数为扑克牌Id */
  PLAY = 12;
  /** 发牌 **/
  SEND_POKER = 13;
  /** 发展示牌给玩家 **/
  SEND_DISPLAY_POKER = 14;
  /** 玩家墩结算 **/
  SETTLE_PLAY = 15;
  /** 玩家盘结算 有参数0: oldExpNum,addExpNum,expAddtion; 参数1: project信息; 参数2: 连赢盘倍率; 参数3: 春天倍率; 参数4: 是否整局比赛结束 **/
  SETTLE_CIRCLE = 16;
  /** 游戏最终结算 参数0到参数3: 座位号0到3玩家变化数量;  参数4: 金币上限 -1 表示无上限 **/
  SETTLE_FINAL = 17;
  /** 选择project 参数0: project类型(0: baloot; 1: sira; 2: 50; 3: 100; 4: 400;); 参数1: 选择数量(0 1 2) **/
  PROJECT = 18;
  /** 确认hokum/2nd hokum 模式 **/
  CONFIRM_HOKUM = 19;
  /** 激活project 参数0: json */
  ACTIVE_PROJECT = 20;
  /** 托管 参数0: 0: 取消托管; 1: 托管 */
  TRUSTEESHIP = 21;
  /** 激活baloot 参数0: json */
  ACTIVE_BALOOT = 22;
  /** 摊牌 参数0: json 各玩家手牌信息 */
  ALL_LOSER = 23;
  /** 行牌模式 参数0: 行牌模式类型(0: open-正常行牌; 1: close-特殊) */
  PLAY_MODE = 24;
  /** 创建新盘 */
  CREATE_NEW_CIRCLE = 25;
  /** 打乱座位 参数数组（索引为位置ID，值为玩家ID） */
  SHUFFLE_SEAT = 26;
  /** 公开展示牌 **/
  OPEN_DISPLAY_POKER = 27;
  /** 使用普通表情  参数0: 普通表情id **/
  COMMON_EMOTE = 28;
  /** 使用快捷短语  参数0: 快捷短语id **/
  QUICK_WORD = 29;
  /** 使用互动表情  参数0: 互动表情id;  参数1: 被使用玩家id; 参数2: 发送者增加魅力值; 参数3: 接收者增加魅力值; **/
  INTERACTIVE_EMOTE = 30;
  /** 客户端展示VS **/
  SHOW_VS = 31;
  /** 客户端展示dealer **/
  SHOW_DEALER = 32;
  /** 玩家金币变更 参数0: 当前金币数量 **/
  GOLD_CHANGE = 33;
  /** 玩家属性变更 参数0: 属性类型: 0-等级变化; 1-vip等级变化; 2-魅力值; 3-给桌内玩家赠送礼物;  参数1: 参数(当前值) **/
  ATTRIBUTE_CHANGE = 34;
  /** 比赛玩家盘结算 **/
  MATCH_SETTLE_CIRCLE = 35;
}

// 请求执行游戏命令
message CGBalootExecuteCommandMessage {
  /** 游戏命令 */
  CommandEnum command = 1;
  /** 游戏命令参数 */
  repeated string args = 2;
  /** seq */
  int32 seq = 3;
}

// 推送玩家游戏中变动消息
message OnGCPushBalootGameMessage {
  /** 操作玩家id */
  int64 lastOpPlayerId = 1;
  /** 操作命令 */
  CmdBean cmdBean = 2;
  /** baloot桌子消息 */
  BalootTableBean balootInfo = 3;
}

// Baloot游戏模式
enum BalootModeEnum {
  /** 默认空 */
  NULL = 0;
  /** 正常模式 */
  COMMON = 1;
  /** 一局游戏 */
  TRIAL = 2;
}

// 请求创建baloot桌子
message CWBalootCreateTableMessage {
  /** 游戏模式 */
  BalootModeEnum mode = 1;
  /** 底金 */
  int64 baseGold = 2;
  /** 随机座位 */
  bool rollSeat = 3;
  /** 允许语聊 */
  bool voice = 4;
  /** 密码 */
  string lock = 5;
  /** 扑克皮肤Id */
  int32 pokerSkinId = 6;
  /** 桌子皮肤Id */
  int32 tableSkinId = 7;
}

// 请求baloot自建房列表
message CGBalootDiyTablesMessage {
  /** 游戏模式 */
  BalootModeEnum mode = 1;
  /** 底金 */
  int64 baseGold = 2;
  /** 允许语聊 */
  bool voice = 3;
  /** 随机座位 */
  bool rollSeat = 4;
  /** 桌子ID */
  int32 tableId = 5;
  /** 桌子激活ID（桌子使用时的唯一ID，可用于排序） */
  int64 activeId = 6;
}

// 响应baloot自建房列表
message GCBalootDiyTablesMessage {
  /** 桌子列表 */
  repeated GameTableBaseBean tables = 1;
}

// baloot桌子推送变动来源
enum BalootDiyTableChangeSourceEnum {
  /** 桌子列表 */
  TABLE_LIST = 0;
  /** 聊天消息分享 */
  CHAT = 1;
}

// 推送baloot自建房信息变动
message OnBalootDiyTableChangeMessage {
  /** 变动来源 */
  BalootDiyTableChangeSourceEnum source = 1;
  /** 桌子激活ID（桌子使用时的唯一ID） */
  int64 activeId = 2;
  /** 桌子信息（空表示删除） */
  GameTableBaseBean table = 3;
}

// 请求baloot游戏房间信息
message CGBalootRoomInfosMessage {
  /** 游戏模式 */
  BalootModeEnum mode = 1;
}

// 返回baloot游戏房间信息
message GCBalootRoomInfosMessage {
  /** 房间列表 */
  repeated GameRoomInfoBean rooms = 1;
}

// 请求baloot自建房桌子基本信息
message CGBalootDiyTableInfoMessage {
  /** 桌子激活ID（桌子使用时的唯一ID） */
  repeated int64 activeIds = 1;
}

// 响应baloot自建房桌子基本信息
message GCBalootDiyTableInfoMessage {
  /** 桌子基本信息 */
  repeated GameTableBaseBean tables = 1;
}

// baloot 自建房事件
enum BalootDiyTableEventEnum {
  /** 进入玩家 */
  BALOOT_DIY_TABLE_EVENT_ENTER_PLAYER = 0;
  /** 更换座位 */
  BALOOT_DIY_TABLE_EVENT_CHANGE_SEAT = 1;
  /** 开始游戏 */
  BALOOT_DIY_TABLE_EVENT_START_GAME = 2;
  /** 结束游戏 */
  BALOOT_DIY_TABLE_EVENT_END_GAME = 3;
  /** 离开玩家 */
  BALOOT_DIY_TABLE_EVENT_EXIT_PLAYER = 4;
}

// baloot 自建房事件消息
message OnGWBalootDiyTableEventMessage {
  /** 事件 */
  BalootDiyTableEventEnum event = 1;
  /** 桌子唯一ID */
  int64 activeId = 2;
  /** 桌子信息-桌子解散时为null */
  BalootDiyTableInfoBean tableInfo = 3;
}

// baloot 自建房信息
message BalootDiyTableInfoBean {
  /** 桌子面板信息 */
  BalootTableFrameBean tableFrame = 1;
  /** 玩家信息 */
  repeated CommonTablePlayerBean players = 2;
}

// baloot 桌子面板信息
message BalootTableFrameBean {
  /** 基本桌子信息 */
  CommonTableBaseBean tableInfo = 1;
  /** 桌子额外信息 */
  BalootTableExtBean extInfo = 2;
}

// baloot 桌子额外信息
message BalootTableExtBean {
  /** 上锁状态 */
  bool lock = 1;
  /** 随机座位 */
  bool rollSeat = 2;
  /** 金币下限 */
  int64 goldLowerLimit = 3;
  /** 金币上限 */
  int64 goldUpperLimit = 4;
  /** 房主ID（非自建房为空） */
  int64 ownerId = 5;
  /** 底金 */
  int64 baseGold = 6;
  /** baloot游戏模式 */
  BalootModeEnum mode = 7;
}






// 客户端请求匹配游戏
message CWMatchGameMessage {
  /** 游戏id */
  int32 gameId = 1;
  /** 房间id */
  int32 roomId = 2;
  /** 是否新玩家第一次匹配 */
  bool newPlayerFirstMatch = 3;
}

// 通知客户端匹配游戏成功消息
message OnGCMatchGameMessage {
  /** 玩家信息 */
  repeated GamePlayerBean players = 1;
}

// 通知客户端进行中的游戏消息
message OnWCPlayerGamingMessage {
  /** 游戏id */
  int32 gameId = 1;
  /** 房间id */
  int32 roomId = 2;
}

// 客户端请求进入游戏
message CWEnterGameMessage {
  /** 游戏id */
  int32 gameId = 1;
  /** 房间id */
  int32 roomId = 2;
  /** 桌子id */
  int32 tableId = 3;
  /** 位置id */
  int32 seatId = 4;
  /** 桌子密码（若有） */
  string password = 5;
}

// 进入游戏响应
message GCEnterGameMessage {
  /** 玩家位置 */
  PlayerSeatBean seat = 1;
}

// 响应信息同步
message GCSyncGameMessage {
  /** 桌子基本信息（含玩家信息） */
  GameTableBaseBean baseInfo = 1;
  /** baloot游戏内桌子数据 */
  BalootTableBean balootInfo = 2;
  /** 比赛相关数据(若有) */
  TournamentGameFrameInfo tournamentInfo = 3;
}

// 推送玩家变动消息
message OnGCPushPlayerMessage {
  /** 玩家位置 */
  int32 seatId = 1;
  /** 玩家信息 */
  GamePlayerBean player = 2;
  /** 玩家事件 */
  PlayerTableAction playerAction = 3;
}

/** 玩家桌子事件 */
enum PlayerTableAction {
  /** 进入游戏 */
  ENTER = 0;
  /** 退出游戏 */
  EXIT = 1;
  /** 换桌位 */
  CHANGE_SEAT = 2;
  /** 暂时离开 */
  TEMP_LEAVE = 3;
}

// 游戏玩家信息
message GamePlayerBean {
  /** 玩家基础信息 */
  PlayerBaseInfoBean baseInfo = 1;
  /** 玩家位置信息 */
  PlayerSeatBean seatInfo = 2;
  /** 桌子玩家信息 */
  PokerPlayerBean pokerPlayerBean = 3;
  /** 语音Token信息 */
  string voiceToken = 4;
}

// 通用游戏玩家信息
message CommonTablePlayerBean {
  /** 玩家基础信息 */
  PlayerBaseInfoBean baseInfo = 1;
  /** 玩家位置信息 */
  PlayerSeatBean seatInfo = 2;
}

// 玩家位置
message PlayerSeatBean {
  /** 玩家id */
  int64 playerId = 1;
  /** 游戏id */
  int32 gameId = 2;
  /** 房间id */
  int32 roomId = 3;
  /** 桌子id */
  int32 tableId = 4;
  /** 位置id */
  int32 seatId = 5;
}

// 游戏服信息
message GameInfoBean {
  /** 游戏Id */
  int32 gameId = 1;
  /** 游戏名 */
  string gameName = 2;
  /** 游戏房间 */
  repeated int32 roomIds = 3;
  /** 大版本号 */
  int32 major = 4;
  /** 小版本号 */
  int32 minor = 5;
  /** 启动时间 */
  int64 startTime = 6;
}

// 游戏房间信息
message GameRoomInfoBean {
  /** 房间id */
  int32 roomId = 1;
  /** 房间名 */
  string roomName = 2;
  /** 金币下限 */
  int64 goldLowerLimit = 3;
  /** 金币上限 */
  int64 goldUpperLimit = 4;
  /** 底金 */
  int64 baseGold = 5;
  /** 火爆程度 */
  int32 crowdDensity = 6;
