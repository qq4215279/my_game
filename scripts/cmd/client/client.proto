  /** key-配置名 value-版本号 */
  map<string, string> map = 1;
}

/** 推送配置版本号 */
message OnECConfigVersionMessage {
  /** key-配置名 value-版本号 */
  map<string, string> map = 1;
}

/** 请求获取常量配置 */
message CEClientParamConfigMessage {
  /** 配置名 */
  repeated string keys = 1;
}

/** 响应常量配置 */
message ECClientParamConfigMessage {
  /** key-配置名 value-值 */
  map<string, string> map = 1;
}



