/** 玩家账号信息 */
message AccountBean {
  /** 玩家唯一ID */
  int64 id = 1;
  /** 昵称 */
  string name = 2;
  /** 头像 */
  string head = 3;
  /** 注册的渠道号 */
  string channel = 4;
  /** 登陆的渠道号 */
  string loginChannel = 5;
  /** 绑定的三方平台状态（ThirdPartyAccountEnum 的索引作为bit下标，1表示已绑定） */
  int32 accountBindStatus = 6;
}

// 登陆请求
message ReqLoginMessage {
  /** token */
  string token = 1;
  /** 国际化语言(ar: 阿拉伯语; zhcn: 中文简体; eng: 英文; jap: 日语;  不传默认ar) */
  string languageCode = 2;
  /** 登录渠道 */
  string channel = 3;
}

// 登陆响应
message ResLoginMessage {
  /** 玩家信息 */
  PlayerBaseInfoBean clientPlayerInfo = 1;
  /** 系统时间 */
  int64 systemTime = 2;
  /** 游戏服信息 */
  repeated GameInfoBean games = 3;
  /** 创号奖励 */
  repeated ItemBean playerCreationRewards = 4;
  /** 玩家进行中的游戏id（0 不存在） */
  int32 gameId = 5;
  /** 玩家进行中的房间id（0 不存在） */
  int32 roomId = 6;
  /** 玩家新手引导类型 0-老引导 1-新引导 */
  int32 guideType = 7;
  /** 是否付费用户 */
  bool charged = 8;
  /** 绑定奖励 */
  repeated ItemBean bindRewards = 9;
}

// 登出响应
message ResLogoutMessage {
  /** 退出原因 */
  ExitReason reason = 1;
}

/** 服务器推送玩家下线消息 */
message OnECLogoutMessage {
  /** 退出原因 */
  ExitReason reason = 1;
}

/** 停服通知 */
message OnClosingServerNoticeMessage {
  /** 停服内容 */
  string content = 1;
}

/** 退出原因 */
enum ExitReason {
  /** 正常退出 */
  NORMAL = 0;
  /** 会话关闭 */
  SESSION_CLOSE = 1;
  /** 重复登陆，顶号 */
  REPEAT_LOGIN = 2;
  /** 踢出 */
  KICK = 3;
  /** 踢到大厅 */
  KICK_TO_WORLD = 4;
  /** 连接超时关闭 */
  READER_IDLE_CLOSE = 5;
  /** 服务器异常 */
  SERVER_ERROR = 6;
  /** 停服踢出 */
  KICK_SERVER_CLOSING = 7;
  /** 踢出语音房 */
  KICK_VOICE = 8;
}



// 操作邮件
enum MailOperate {
  // 获取邮件
  MAIL_GET = 0;
  // 读邮件
  MAIL_READ = 1;
  // 领邮件奖励
  MAIL_RECEIVE = 2;
  // 删除邮件
  MAIL_DELETE = 3;
}

// 邮件信息
message MailBean {
  // id
  int64 mailId = 1;
  // 类型（-1系统邮件）
  int32 mailType = 2;
  // 标题
  string title = 3;
  // 内容
  string content = 4;
  // 创建时间ms
  int64 createTime = 5;
  // 过期时间ms
  int64 expireTime = 6;
  // 奖励
  repeated ItemBean rewards = 7;
  // 状态 -1-已删除 0-未读 1-已读 2-已领取
  int32 flag = 8;
  // 是否能删除
  int32 cannotDel = 9;
  // 操作人员（服务器使用）
  string operator = 10;
}

// 操作邮件请求
message CWOperateMailMessage {
  // 操作
  MailOperate operate = 1;
  // 操作的邮件ID（不传Id查表示操作全部邮件）
  int64 mailId = 2;
}

// 操作邮件响应
message WCOperateMailMessage {
  /** 邮件详情 operate: GET */
  repeated MailBean mails = 1;
  /** 获得奖励 operate: RECEIVE */
  repeated ItemBean rewards = 2;
  /** 邮件数量 operate: GET/DEL */
  int32 mailCount = 3;
  /** 邮件容量 operate: GET/DEL */
  int32 mailCapacity = 4;
}



// 协议载体
message MessageProxy {
  /** 请求协议 cmd */
  int32 cmd = 1;
  /** seq */
  int32 seq = 2;
  /** 错误码 */
  ErrorCode errorCode = 3;
  /** 具体的业务消息通过protoBuf序列化后的二进制数据 */
  bytes data = 4;
  /** 玩家id（内部使用） */
  int64 playerId = 5;
  /** 协议类型 */
  CmdType cmdType = 6;
}

// 协议类型
enum CmdType {
  /** 客户端消息 */
  CLIENT_REQUEST_TYPE = 0;
  /** 客户端消息 */
  CLIENT_RESPONSE_TYPE = 1;
  /** rpc请求消息 */
  RPC_REQUEST_TYPE = 2;
  /** rpc响应消息 */
  RPC_RESPONSE_TYPE = 3;
}


// 实体缓存数据包集合，用于在服务间传递缓存数据
message PackEntitiesBean {
  /** 打包的实体数据 */
  repeated PackEntityBean entities = 1;
}

// 实体缓存的数据包，对应 IDataEntity 的数据
message PackEntityBean {
  /** 操作类型 */
  string modifyType = 1;
  /** 实体数据类型 */
  string entityType = 2;
  /** 实体数据 */
  bytes data = 3;
}

// 实体缓存修改通知
message OnModelChangeMessage {
  /** 触发通知的服务器id */
  int32 serverId = 1;
  /** 变动的实体数据类型 */
  string entityType = 2;
  /** 变动的实体数据玩家 */
  repeated ModelChangeBean changeBeans = 3;
}

// 实体缓存变动数据
message ModelChangeBean {
  /** 变动的实体数据玩家 */
  int64 playerId = 1;
  /** 新增修改的实体数据key */
  repeated string modifyDadaKeys = 2;
  /** 删除的实体数据key */
  repeated string delDadaKeys = 3;
}



// 广播消息
message BroadcastMessage {
  /** 请求协议 cmd */
  int32 cmd = 1;
  /** 具体的业务消息通过protoBuf序列化后的二进制数据 */
  bytes msg = 2;
  /** 错误码 */
  ErrorCode errorCode = 3;
  /** 包含的玩家集 */
  repeated int64 includeIds = 4;
  /** 排除的玩家集 */
  repeated int64 excludeIds = 5;
  /** 包含的渠道集 */
  repeated string includeChannels = 6;
  /** 排除的渠道集 */
  repeated string excludeChannels = 7;
}


// 推送跑马灯消息
message OnACScrollMessage {
  /** 跑马灯列表 */
  repeated ScrollBean scrolls = 1;
}

/** 跑马灯类型 */
enum ScrollType {
  /** 周期循环 */
  SCROLL_SYSTEM = 0;
  /** 一次性 */
  SCROLL_COMMON = 1;
}

// 跑马灯信息
message ScrollBean {
  /** 消息ID */
  int64 id = 1;
  /** 类型 */
  ScrollType type = 2;
  /** 文本模板Key */
  string tmpKey = 3;
  /** 参数（可选） */
  repeated string args = 4;
  /** 优先级 */
  int32 order = 5;
  /** 播放开始时间ms（周期循环类型才有） */
  int64 beginTime = 6;
  /** 播放结束时间ms（周期循环类型才有） */
  int64 endTime = 7;
  /** 轮播间隔s（周期循环类型才有） */
  int32 interval = 8;
}



