// 比赛类型
enum TournamentType {
  /** 班车赛 */
  TOURNAMENT_SHUTTLE = 0;
  /** 定时赛 */
  TOURNAMENT_TIME = 1;
}

// 比赛阶段
enum TournamentStageEnum {
  /** 展示挂牌阶段 */
  TOURNAMENT_SHOW = 0;
  /** 报名阶段 */
  TOURNAMENT_APPLY = 1;
  /** 准备阶段 */
  TOURNAMENT_PREPARE = 2;
  /** 比赛阶段-开始匹配阶段 */
  TOURNAMENT_MATCH_START = 3;
  /** 比赛阶段-等待完成阶段 */
  TOURNAMENT_MATCH_WAIT = 4;
  /** 比赛阶段-结算晋级阶段（结算后重新回到开始匹配阶段） */
  TOURNAMENT_MATCH_SETTLE = 5;
  /** 结束阶段 */
  TOURNAMENT_END = 6;
}

// 比赛阶段的进程配置信息
message TournamentMatchProgressInfo {
  /** 进程名（预赛、淘汰赛、决赛等） */
  string name = 1;
  /** 每次晋级需要打的轮数（如：1、1、2） */
  repeated int32 roundList = 2;
  /** 每次晋级的列表（如：32、24、16） */
  repeated int32 advanceList = 3;
  /** 积分衰退系数（服务器使用） */
  double rate = 4;
}

// 比赛面板信息
message TournamentFrameInfo {
  /** 比赛类型 */
  TournamentType type = 1;
  /** 比赛ID */
  int32 id = 2;
  /** 比赛名 */
  string name = 3;
  /** 皮肤 */
  string skin = 4;
  /** 报名费 */
  repeated ItemBean cost = 5;
  /** 是否报名（未报名或被淘汰时，均为false） */
  bool join = 6;
  /** 比赛当前阶段 */
  TournamentStageEnum stage = 7;
  /** 开赛人数（班车赛） */
  int32 num = 8;
  /** 参数人数（定时赛） */
  int32 joinNum = 9;
  /** 比赛开始时间（定时赛） */
  int64 startTime = 10;
  /** 可报名时间偏移量 ms 0-无（定时赛） */
  int64 applyTimeOffset = 11;
  /** 等待时间偏移量 ms 0-无（定时赛） */
  int64 readyTimeOffset = 12;
  /** 是否被淘汰（定时赛被淘汰，且比赛仍在进行中，返回true） */
  bool knockout = 13;
}

// 比赛奖励配置
message TournamentRewardBean {
  /** 排名下限 */
  int32 rankMin = 1;
  /** 排名上限 */
  int32 rankMax = 2;
  /** 奖励 */
  repeated ItemBean rewards = 3;
  /** 奖励串（服务器使用） */
  string rewardStr = 4;
}

// 比赛历史信息
message TournamentHistoryBean {
  /** 排名 */
  int32 rank = 1;
  /** 时间 */
  int64 time = 2;
}

// 获取比赛列表
message CZTournamentFrameListMessage {
  /** 比赛类型 */
  TournamentType type = 1;
}

// 返回比赛列表
message ZCTournamentFrameListMessage {
  /** 比赛面板信息 */
  repeated TournamentFrameInfo frameInfo = 1;
}

// 返回比赛列表
message ZCMyTournamentFrameListMessage {
  /** 比赛面板信息 */
  repeated TournamentFrameInfo frameInfo = 1;
}

// 获取比赛详细
message CZTournamentFrameDetailMessage {
  /** 比赛ID */
  int32 id = 1;
  /** 是否需要配置信息 */
  bool needConfig = 2;
}

// 返回比赛详细
message ZCTournamentFrameDetailMessage {
  /** 比赛排名奖励 */
  repeated TournamentRewardBean rewards = 1;
  /** 比赛历史记录 */
  repeated TournamentHistoryBean history = 2;
  /** 比赛最佳历史 */
  TournamentHistoryBean bestHistory = 3;
  /** 参数人数 */
  int32 joinNum = 4;
  /** 是否报名 */
  bool join = 5;
}


// 加入比赛
message CZJoinTournamentMessage {
  /** 比赛ID */
  int32 id = 1;
}

// 退出比赛
message CZUnJoinTournamentMessage {
  /** 比赛ID */
  int32 id = 1;
}

// 比赛通知客户端匹配游戏成功
message OnGCTournamentMatchGameMessage {
  /** 匹配的玩家id */
  repeated int64 playerIds = 1;
}

// 比赛状态切换通知
message OnZCTournamentStageChangeMessage {
  /** 比赛ID */
  int32 id = 1;
  /** 比赛当前阶段 */
  TournamentStageEnum stage = 2;
  /** 比赛名 */
  string name = 3;
}

// 比赛阶段-结算信息（一轮比赛结束，玩家晋级或淘汰信息）
message OnZCTournamentSettleMessage {
  /** 比赛ID */
  int32 id = 1;
  /** 比赛类型 */
  TournamentType type = 2;
  /** 比赛当前阶段 */
  TournamentStageEnum stage = 3;
  /** 比赛排名 */
  int32 rank = 4;
  /** 比赛积分 */
  int32 score = 5;
  /** 转换后的积分 */
  int32 transScore = 6;
  /** 是否晋级 */
  bool advance = 7;
  /** 奖励（淘汰玩家若有） */
  repeated ItemBean rewards = 8;
}


// 比赛阶段-玩家积分信息
message TournamentGamePlayerScoreInfo {
  /** 玩家id */
  int64 playerId = 1;
  /** 比赛排名 */
  int32 rank = 2;
  /** 当前积分 */
  int32 score = 3;
}

// 比赛阶段-游戏中的面板信息（一局比赛打完返回，游戏同步协议返回）
message TournamentGameFrameInfo {
  /** 比赛ID */
  int32 id = 1;
  /** 当前进度信息 */
  repeated TournamentMatchProgressInfo progressInfo = 2;
  /** 当前进程索引 */
  int32 progressIdx = 3;
  /** 当前晋级索引 */
  int32 advanceIdx = 4;
  /** 当前盘数 */
  int32 currRound = 5;
  /** 玩家积分信息 */
  repeated TournamentGamePlayerScoreInfo playerInfos = 6;
  /** 参与人数 */
  int32 playerNum = 7;
  /** 比赛类型 */
  TournamentType type = 8;
}


// 比赛阶段-推送比赛剩余等待人数
message OnZCTournamentMatchWaitNumMessage {
  /** 比赛ID */
  int32 id = 1;
  /** 剩余等待人数 */
  int32 waitNum = 2;
}

// 已报名的比赛信息
message TournamentApplyBean {
  /** 比赛ID */
  int32 id = 1;
  /** 比赛名 */
  string name = 2;
  /** 比赛开始时间 */
  int64 startTime = 3;
}

// 推送已报名未开赛的比赛信息
message OnZCTournamentApplyMessage {
  /** 报名的比赛 */
  repeated TournamentApplyBean applyBeans = 1;
}

// 推送进行中的比赛ID
message OnZCTournamentMatchingMessage {
  /** 比赛ID */
  int32 id = 1;
  /** 比赛名 */
  string name = 2;
}

// 返回进行中的比赛ID
message ZCTournamentMatchingMessage {
  /** gameId */
  int32 gameId = 1;
  /** roomId */
  int32 roomId = 2;
  /** 比赛ID */
  int32 id = 3;
  /** 比赛名 */
  string name = 4;
}

// 比赛阶段-请求进行中的比赛信息
message CZTournamentMatchStageInfoMessage {
  /** 比赛ID */
  int32 id = 1;
}

// 比赛阶段-响应获取进行中的比赛信息
message ZCTournamentMatchStageInfoMessage {
  /** 比赛类型 */
  TournamentType type = 1;
  /** 比赛当前阶段 */
  TournamentStageEnum stage = 2;
  /** 剩余等待人数 */
  int32 waitNum = 3;
  /** 准备阶段-结束时间（ms） */
  int64 prepareTime = 4;
  /** 准备阶段-初始积分 */
  int32 initScore = 5;
  /** 比赛阶段-进行中的面板信息 */
  TournamentGameFrameInfo frameInfo = 6;
}





// 请求获取冲级活动信息
message CWGetUpgradeActivityInfoMessage {
}

// 响应获取冲级活动信息
message WCGetUpgradeActivityInfoMessage {
