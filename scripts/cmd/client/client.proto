  /** 发送时间 */
  int64 sendTime = 5;
  /** 赠送数量 */
  int64 num = 6;
  /** 房间id */
  int32 voiceId = 7;
  /** 类型(大于0: 指定玩家发送; -1: 给所有人发送礼物; -2: 给上麦玩家发送); */
  int64 receiveWay = 8;
}


// 请求获取玩家语音房积分信息列表
message CZGetPlayerVoicePointListMessage {
  /** 类型: -1-所有列表; 0-礼物获得; 1: 房间获得; 2: 商城使用消耗; 3: 提现消耗 */
