  repeated VoiceGiftHandbookBean giftHandbookBeanList = 1;
}

// 语音房礼物图鉴bean
message VoiceGiftHandbookBean {
  /** 礼物id */
  int32 giftId = 1;
  /** 礼物名称 */
  string name = 2;
  /** 赠送通用消耗 */
  repeated ItemBean cost = 3;
  /** 赠送获得 */
  ItemBean giftItemBean = 4;
  /** 页签 */
  int32 tab = 5;
  /** 子类型 */
  int32 subType = 6;
  /** 排序 */
  int32 sort = 7;
}
